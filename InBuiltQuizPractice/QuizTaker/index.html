<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preparation Executer — Advanced Quiz Platform</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/themes.css">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- PDF Generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* Print styles for PDF download */
    @media print {
      #sidebar, #topbar, .btn, .tabs, #result-tabs { display:none !important; }
      #main-content { padding:0; max-height:none; overflow:visible; }
      #app { display:block; }
      .card, .card-elevated { box-shadow:none; border:1px solid #e2e8f0; }
      body { background:#fff; color:#000; }
    }

    /* Sidebar icon tooltips */
    .sidebar-btn .sb-label {
      position:absolute; left:72px; top:50%; transform:translateY(-50%);
      background:var(--bg-elevated); color:var(--text-primary);
      padding:4px 10px; border-radius:var(--radius-sm);
      font-size:.78rem; font-weight:600; white-space:nowrap;
      opacity:0; pointer-events:none; border:1px solid var(--border-color);
      transition:opacity .15s; z-index:200;
    }
    .sidebar-btn:hover .sb-label { opacity:1; }
    .sidebar-btn { position:relative; }

    /* Quiz nav dot hover */
    .q-nav-dot:hover { transform:scale(1.15); }

    @keyframes slideUp {
      from { opacity:0; transform:translateY(10px); }
      to { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- ── Topbar ── -->
  <header id="topbar">
    <div class="logo" onclick="location.reload()" style="cursor:pointer" title="Reload / Home">
      <div class="logo-mark">Q</div>
      <span>Preparation Executer</span>
    </div>

    <!-- Center Navigation (Desktop) -->
    <nav class="topbar-nav">
      <button class="nav-item active" data-page="welcome" onclick="UI.navigate('welcome')">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </button>

      <button class="nav-item" data-page="setup-topics" onclick="Dashboard.startQuiz()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span>New Quiz</span>
      </button>

      <button class="nav-item" data-page="history" onclick="UI.navigate('history')">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>History</span>
      </button>

    </nav>

    <!-- Mobile Nav Menu (Compact) -->
    <div class="mobile-nav-wrap">
       <button class="icon-btn menu-trigger" onclick="UI.toggleNavMenu(event)" title="Explore Menu">
         <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
           <path d="M4 6h16M4 12h16M4 18h16"/>
         </svg>
       </button>
       <div id="nav-dropdown-menu" class="nav-menu hidden">
          <div class="menu-item" onclick="UI.navigate('welcome')">🏠 Home</div>
          <div class="menu-item" onclick="Dashboard.startQuiz()">🚀 New Quiz</div>
          <div class="menu-item" onclick="UI.navigate('history')">🕒 History</div>
          <div class="menu-divider" style="height:1px; background:var(--border-color); margin:8px 0"></div>
          <div class="menu-item" onclick="toggleQuickTheme()">🌓 Toggle Theme</div>
          <div class="menu-item" onclick="UI.openSettings()">⚙ Settings</div>
       </div>
    </div>

    <!-- Group Switcher (Space Saver) -->
    <div class="group-switcher-wrap">
      <button class="group-switcher-btn" onclick="UI.toggleGroupMenu(event)">
        <span id="active-group-label">General Test</span>
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
          <path d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div id="group-dropdown-menu" class="group-menu hidden">
        <!-- Populated via JS -->
      </div>
    </div>

    <div class="topbar-right">
      <!-- Theme toggle -->
      <button class="icon-btn" data-tip="Toggle Theme" onclick="toggleQuickTheme()" id="theme-toggle-btn">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>

      <!-- Settings -->
      <button class="icon-btn" data-tip="Settings" onclick="UI.openSettings()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Main View ── -->
  <main id="main-content"></main>

  <div id="toast-container"></div>
</div>

<!-- Scripts -->
<script src="js/env.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/filters.js"></script>
<script src="js/quiz-config.js"></script>
<script src="components/question-types.js"></script>
<script src="js/quiz.js"></script>
<script src="js/result.js"></script>
<script src="js/dashboard.js"></script>

<script>
// ── App Init ───────────────────────────────────────────────
(function init() {
  const theme = State.get('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  UI.populateGroupSelect();
  window.addEventListener('popstate', () => UI.goBack());
  window.toggleQuickTheme = () => {
    const cur  = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    UI.setTheme(next);
  };
  UI.pushPage('welcome');
  State.on('page', (page) => {
    const labels = {
      'welcome': 'Home', 'setup-topics': 'Topics', 'setup-filters': 'Filters', 
      'setup-config': 'Config', 'setup-template': 'Design', 'quiz': 'Quiz', 'result': 'Result'
    };
    if (labels[page]) document.title = `Executer — ${labels[page]}`;
  });
})();
</script>
</body>
</html>
