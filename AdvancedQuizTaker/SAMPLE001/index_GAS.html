<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>QuizMaster Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css_main.css">
  <link rel="stylesheet" href="css_quiz.css">
</head>
<body class="theme-dark" data-page="landing">

<!-- ░░ SETTINGS PANEL ░░ -->
<div id="settingsOverlay" class="settings-overlay hidden"></div>
<aside id="settingsPanel" class="settings-panel">
  <div class="sp-header">
    <span class="sp-title"><i class="fa fa-cog"></i> Configuration</span>
    <button class="sp-close" onclick="UI.closeSettings()"><i class="fa fa-times"></i></button>
  </div>
  <div class="sp-body">
    <div class="sp-section">
      <label class="sp-label">Root Folder ID</label>
      <input id="spFolderId" class="sp-input" type="text" placeholder="Google Drive Folder ID"/>
    </div>
    <div class="sp-section">
      <label class="sp-label">Script ID</label>
      <input id="spScriptId" class="sp-input" type="text" placeholder="Google Apps Script ID"/>
    </div>
    <div class="sp-actions">
      <button class="btn-primary" onclick="UI.saveSettings()"><i class="fa fa-save"></i> Save</button>
      <button class="btn-ghost" onclick="UI.resetSettings()"><i class="fa fa-rotate-left"></i> Reset to Default</button>
    </div>
    <div id="spMsg" class="sp-msg"></div>
    <hr class="sp-divider"/>
    <div class="sp-section">
      <label class="sp-label">Theme</label>
      <div class="theme-toggle-row">
        <button class="theme-btn active" id="btnDark" onclick="UI.setTheme('dark')"><i class="fa fa-moon"></i> Dark</button>
        <button class="theme-btn" id="btnLight" onclick="UI.setTheme('light')"><i class="fa fa-sun"></i> Light</button>
      </div>
    </div>
    <div class="sp-section">
      <label class="sp-label">Quiz Template</label>
      <div class="template-list" id="templateList">
        <button class="tpl-btn active" data-tpl="classic" onclick="UI.setTemplate('classic')">Classic</button>
        <button class="tpl-btn" data-tpl="card" onclick="UI.setTemplate('card')">Card Focus</button>
        <button class="tpl-btn" data-tpl="split" onclick="UI.setTemplate('split')">Split View</button>
        <button class="tpl-btn" data-tpl="immersive" onclick="UI.setTemplate('immersive')">Immersive</button>
      </div>
    </div>
    <hr class="sp-divider"/>
    <div class="sp-section">
      <p class="sp-hint">Share Link (no personal details)</p>
      <button class="btn-ghost full" onclick="UI.copyShareLink()"><i class="fa fa-share-nodes"></i> Copy Share Link</button>
    </div>
  </div>
</aside>

<!-- ░░ SIDEBAR TOGGLE ░░ -->
<button class="fab-settings" onclick="UI.openSettings()" title="Settings">
  <i class="fa fa-sliders"></i>
</button>

<!-- ░░ APP ROOT ░░ -->
<div id="app"></div>

<!-- ░░ TOAST ░░ -->
<div id="toast" class="toast hidden"></div>


<script src="js_utils.js"></script>
<script src="js_state.js"></script>
<script src="js_api.js"></script>
<script src="js_ui.js"></script>
<script src="js_quiz.js"></script>
<script src="js_results.js"></script>
<script src="js_templates.js"></script>

<script>
  // Bootstrap
  document.addEventListener("DOMContentLoaded", function(){
    State.init();
    API.loadConfig().then(function(cfg){
      if (cfg) {
        document.getElementById("spFolderId").value = cfg.rootFolderId || "";
        document.getElementById("spScriptId").value = cfg.scriptId     || "";
      }
      Router.go("landing");
    });
  });
</script>
</body>
</html>
