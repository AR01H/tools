<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizPro — Advanced Quiz Platform</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/themes.css">

  <!-- Chart.js (Kept for compatibility if used elsewhere) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- PDF Generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* Print styles for PDF download */
    @media print {
      #sidebar, #topbar, .btn, .tabs, #result-tabs { display:none !important; }
      #main-content { padding:0; max-height:none; overflow:visible; }
      #app { display:block; }
      .card, .card-elevated { box-shadow:none; border:1px solid #e2e8f0; }
      body { background:#fff; color:#000; }
    }

    /* Sidebar icon tooltips */
    .sidebar-btn .sb-label {
      position:absolute; left:72px; top:50%; transform:translateY(-50%);
      background:var(--bg-elevated); color:var(--text-primary);
      padding:4px 10px; border-radius:var(--radius-sm);
      font-size:.78rem; font-weight:600; white-space:nowrap;
      opacity:0; pointer-events:none; border:1px solid var(--border-color);
      transition:opacity .15s; z-index:200;
    }
    .sidebar-btn:hover .sb-label { opacity:1; }
    .sidebar-btn { position:relative; }

    /* Quiz nav dot hover */
    .q-nav-dot:hover { transform:scale(1.15); }
  </style>
</head>
<body>

<div id="app">
  <!-- ── Topbar ── -->
  <header id="topbar">
    <div class="logo">
      <div class="logo-mark">Q</div>
      <span>QuizPro</span>
    </div>

    <!-- Breadcrumb / page title -->
    <div id="topbar-breadcrumb" style="font-size:.85rem;color:var(--text-secondary);margin-left:var(--sp-sm)"></div>

    <div class="topbar-right">
      <!-- Share button -->
      <button class="icon-btn" data-tip="Share" onclick="Dashboard.startQuiz && navigator.share && navigator.share({title:'QuizPro',url:location.href})">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/>
        </svg>
      </button>

      <!-- Theme toggle (quick dark/light) -->
      <button class="icon-btn" data-tip="Toggle Theme" onclick="toggleQuickTheme()" id="theme-toggle-btn">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>

      <!-- Settings -->
      <button class="icon-btn" data-tip="Settings" onclick="UI.openSettings()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Sidebar ── -->
  <nav id="sidebar">
    <button class="icon-btn sidebar-btn active" data-page="welcome" onclick="UI.navigate('welcome')">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="sb-label">Home</span>
    </button>

    <button class="icon-btn sidebar-btn" data-page="setup-topics" onclick="Dashboard.startQuiz()">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      <span class="sb-label">New Quiz</span>
    </button>

    <button class="icon-btn sidebar-btn" data-page="result" onclick="UI.navigate('result')">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span class="sb-label">Results</span>
    </button>

    <button class="icon-btn sidebar-btn" data-page="history" onclick="UI.navigate('history')">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="sb-label">History</span>
    </button>

    <!-- Spacer -->
    <div style="flex:1"></div>

    <!-- Bottom settings -->
    <button class="icon-btn sidebar-btn" onclick="UI.openSettings()">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <span class="sb-label">Settings</span>
    </button>
  </nav>

  <!-- ── Main Content ── -->
  <main id="main-content">
    <!-- Pages rendered here by JS -->
    <div style="display:grid;place-items:center;height:100%;color:var(--text-muted)">
      <div class="spinner"></div>
    </div>
  </main>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- ── Scripts — order matters ── -->
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/filters.js"></script>
<script src="js/quiz-config.js"></script>
<script src="components/question-types.js"></script>
<script src="js/quiz.js"></script>
<script src="js/result.js"></script>
<script src="js/dashboard.js"></script>

<script>
// ── App Init ───────────────────────────────────────────────
(function init() {
  // Apply saved theme
  const theme = State.get('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);

  // Handle back button via browser history
  window.addEventListener('popstate', () => {
    UI.goBack();
  });

  // Quick theme toggle (dark ↔ light)
  window.toggleQuickTheme = () => {
    const cur  = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    UI.setTheme(next);
  };

  // Start at welcome
  UI.pushPage('welcome');
  updateBreadcrumb('Home');

  // Breadcrumb update on page changes
  State.on('page', (page) => {
    const labels = {
      'welcome':        'Home',
      'setup-topics':   'New Quiz › Topics',
      'setup-filters':  'New Quiz › Filters',
      'setup-config':   'New Quiz › Config',
      'setup-template': 'New Quiz › Design Template',
      'quiz':           'Quiz In Progress',
      'result':         'Results',
      'history':        'History',
    };
    updateBreadcrumb(labels[page] || page);
  });
})();

function updateBreadcrumb(label) {
  const el = document.getElementById('topbar-breadcrumb');
  if (el) el.textContent = '/ ' + label;
}
</script>
</body>
</html>
