<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chart Visualizer Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#171922;--bg3:#1e2130;--bg4:#252840;
  --border:#ffffff12;--border2:#ffffff22;
  --text:#f0f2ff;--text2:#9ba3c4;--text3:#5c6480;
  --accent:#6366f1;--accent2:#818cf8;--accent-bg:#6366f118;
  --success:#22d3a5;--danger:#f87171;--warn:#fbbf24;
  --radius:10px;--radius-lg:16px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --sidebar:240px;--tr:0.18s ease;
}
.light{
  --bg:#f4f5ff;--bg2:#ffffff;--bg3:#f0f1fa;--bg4:#e4e6f8;
  --border:#0000000e;--border2:#00000018;
  --text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --accent-bg:#6366f10d;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:var(--font);cursor:pointer}
input,select{font-family:var(--font)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:0 14px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:200}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;white-space:nowrap}
.logo-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:14px}
.tsearch{position:relative;flex:1;max-width:260px}
.tsearch input{width:100%;padding:6px 10px 6px 30px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-size:13px}
.tsearch input:focus{outline:none;border-color:var(--accent)}
.tsearch input::placeholder{color:var(--text3)}
.tsi{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);pointer-events:none}
.tbar-r{display:flex;align-items:center;gap:6px;margin-left:auto}

/* BUTTONS */
.btn{padding:7px 13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap;transition:all var(--tr)}
.btn:hover{background:var(--bg4)}
.btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.accent:hover{filter:brightness(1.1)}
.btn.danger{color:var(--danger);border-color:transparent}
.btn.danger:hover{background:rgba(248,113,113,.12)}
.btn.ghost{border-color:transparent;background:transparent;color:var(--text2)}
.btn.ghost:hover{background:var(--bg3);color:var(--text)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.xs{padding:2px 7px;font-size:11px}
.icon-btn{width:32px;height:32px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;font-size:14px;transition:all var(--tr)}
.icon-btn:hover{background:var(--bg4);color:var(--text)}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .22s cubic-bezier(.4,0,.2,1);overflow:hidden;z-index:150}
.sidebar.collapsed{width:46px}
.sb-toggle{display:flex;align-items:center;justify-content:center;height:42px;border-bottom:1px solid var(--border);cursor:pointer;color:var(--text3);flex-shrink:0;font-size:16px}
.sb-toggle:hover{color:var(--text)}
.sb-inner{flex:1;overflow-y:auto;overflow-x:hidden}
.sb-section{padding:12px 10px 3px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.sidebar.collapsed .sb-section,.sidebar.collapsed .sel-bar,.sidebar.collapsed .item-info,.sidebar.collapsed .chart-item input[type=checkbox]{display:none}
.sidebar.collapsed .chart-item{justify-content:center;padding:9px}
.sel-bar{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid var(--border)}
.sel-bar label{font-size:12px;color:var(--text2);cursor:pointer;flex:1}
.chart-item{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;transition:background var(--tr);position:relative;overflow:hidden}
.chart-item:hover{background:var(--bg3)}
.chart-item.active{background:var(--accent-bg)}
.chart-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;background:var(--accent);border-radius:0 2px 2px 0}
.chart-item input[type=checkbox]{width:13px;height:13px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.item-icon{width:26px;height:26px;border-radius:6px;background:var(--bg4);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.item-info{flex:1;overflow:hidden;min-width:0}
.item-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-meta{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* CONTENT */
.content{flex:1;display:flex;overflow:hidden;min-width:0}
.panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.panel-header{display:flex;align-items:center;gap:8px;padding:0 14px;height:46px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.chart-title-inp{font-size:14px;font-weight:600;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--text);padding:3px 7px;min-width:60px;max-width:220px}
.chart-title-inp:hover{border-color:var(--border2)}
.chart-title-inp:focus{outline:none;border-color:var(--accent);background:var(--bg3)}
.tab-row{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;overflow-x:auto}
.tab{padding:9px 13px;font-size:13px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all var(--tr);white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.panel-body{flex:1;overflow-y:auto;padding:14px}
.vdiv{width:1px;background:var(--border);flex-shrink:0}

/* FORM ELEMENTS */
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px;margin-bottom:11px}
.sec-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
.field-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.field-row label{font-size:12px;color:var(--text2);min-width:52px;flex-shrink:0}
.fi{flex:1;padding:6px 9px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-size:13px;transition:border-color var(--tr)}
.fi:focus{outline:none;border-color:var(--accent)}
.fi option{background:var(--bg2)}

/* CHART TYPE GRID */
.ct-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.ct-btn{padding:7px 3px;font-size:11px;font-weight:500;border:1px solid var(--border2);border-radius:8px;background:var(--bg3);color:var(--text2);cursor:pointer;text-align:center;transition:all var(--tr);display:flex;flex-direction:column;align-items:center;gap:2px}
.ct-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.ct-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.ct-icon{font-size:14px}

/* DATA TABLE */
.dtbl{width:100%;border-collapse:collapse;font-size:12px}
.dtbl th{text-align:left;padding:5px 7px;color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
.dtbl td{padding:2px 2px;vertical-align:middle}
.dtbl tr:hover td{background:var(--bg3)}
.dtbl td input,.dtbl td select{width:100%;padding:5px 7px;font-size:12px;border:1px solid transparent;border-radius:6px;background:transparent;color:var(--text)}
.dtbl td input:hover,.dtbl td select:hover{border-color:var(--border2);background:var(--bg3)}
.dtbl td input:focus,.dtbl td select:focus{outline:none;border-color:var(--accent);background:var(--bg3)}
.dtbl td select option{background:var(--bg2)}
.row-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:2px 5px;border-radius:5px;line-height:1}
.row-del:hover{color:var(--danger);background:rgba(248,113,113,.12)}

/* AXIS SECTION */
.col-pill-row{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.col-pill{padding:3px 8px;border:1px solid var(--border2);border-radius:20px;font-size:11px;background:var(--bg3);cursor:pointer;color:var(--text2);transition:all var(--tr)}
.col-pill:hover{border-color:var(--accent);color:var(--accent)}
.ax-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;margin:2px;border:1px solid}
.ax-chip.x{border-color:#6366f140;color:var(--accent2);background:var(--accent-bg)}
.ax-chip.y{border-color:#22d3a540;color:var(--success);background:rgba(34,211,165,.07)}
.ax-chip.grp{border-color:#fbbf2440;color:var(--warn);background:rgba(251,191,36,.07)}
.ax-chip-x{cursor:pointer;opacity:.6}
.ax-chip-x:hover{opacity:1}

/* PREVIEW */
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.chart-title-d{font-size:15px;font-weight:600;margin-bottom:2px}
.chart-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:12px}
.legend-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.canvas-wrap{position:relative;width:100%}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--bg3);border-radius:var(--radius);padding:9px 11px}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.stat-val{font-size:17px;font-weight:600;font-family:var(--mono)}

/* SAVED */
.saved-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all var(--tr)}
.saved-card:hover{border-color:var(--border2)}
.saved-card.ac{border-color:var(--accent);background:var(--accent-bg)}
.sc-top{display:flex;align-items:center;gap:8px}
.sc-name{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:10px;padding:2px 6px;border-radius:20px;background:var(--bg4);color:var(--text3);font-family:var(--mono)}
.sc-btns{display:flex;gap:4px;margin-top:7px}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:#00000070;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px;min-width:280px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto}
.modal-hd{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.modal-close{cursor:pointer;color:var(--text3);font-size:18px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-ft{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.upload-area{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:24px;text-align:center;cursor:pointer;transition:border-color var(--tr);color:var(--text3);font-size:13px}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);color:var(--accent)}
.csv-prev-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.csv-prev-tbl th,.csv-prev-tbl td{border:1px solid var(--border);padding:4px 7px;text-align:left}
.csv-prev-tbl th{background:var(--bg3);color:var(--text2);font-weight:500}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 20px;color:var(--text3);text-align:center;gap:10px}
.empty p{font-size:13px;line-height:1.6;max-width:240px}

/* PALETTE */
.swatch-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.swatch{width:18px;height:18px;border-radius:4px;cursor:pointer;transition:transform .12s;border:2px solid transparent}
.swatch:hover,.swatch.on{transform:scale(1.25);border-color:var(--text)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;padding:9px 15px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(6px);pointer-events:none;transition:all .22s;background:var(--bg2);border:1px solid var(--border2);color:var(--text);box-shadow:0 8px 28px #00000040}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:#22d3a540;color:var(--success)}
.toast.error{border-color:#f8717140;color:var(--danger)}

/* MOBILE */
@media(max-width:768px){
  .logo span{display:none}
  .tsearch{max-width:140px}
  .main{flex-direction:column}
  .sidebar{width:100% !important;height:auto;max-height:44px;border-right:none;border-bottom:1px solid var(--border);transition:max-height .22s}
  .sidebar.sb-mobile-open{max-height:50vh;overflow-y:auto}
  .sidebar.collapsed{width:100% !important;height:auto}
  .content{flex:1;flex-direction:column;overflow:hidden}
  .vdiv{width:100%;height:1px}
  #leftPanel{flex:none;height:48%;max-width:100% !important;min-width:unset !important}
  #rightPanel{flex:1}
  .ct-grid{grid-template-columns:repeat(4,1fr)}
  .stat-grid{grid-template-columns:repeat(3,1fr)}
  .panel-header{flex-wrap:wrap;height:auto;padding:8px 12px;gap:6px}
}
@media(max-width:480px){
  .ct-grid{grid-template-columns:repeat(3,1fr)}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .btn{padding:6px 10px;font-size:12px}
  .panel-body{padding:10px}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">📊</div>
      <span>Chart Visualizer</span>
    </div>
    <div class="tsearch">
      <span class="tsi">⌕</span>
      <input type="text" id="globalSearch" placeholder="Search charts…" oninput="filterCharts()">
    </div>
    <div class="tbar-r">
      <button class="icon-btn" onclick="openImportModal()" title="Import CSV">📥</button>
      <button class="icon-btn" onclick="toggleDark()" id="themeBtn" title="Toggle theme">🌙</button>
      <button class="icon-btn" onclick="exportAll()" title="Export all">⬇</button>
      <button class="btn accent" onclick="newChart()">+ New</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar" id="sidebar">
      <div class="sb-toggle" onclick="toggleSidebar()">☰</div>
      <div class="sb-inner">
        <div class="sel-bar">
          <input type="checkbox" id="selectAll" onchange="toggleSelectAll()"/>
          <label for="selectAll">Select all</label>
          <button class="btn xs danger" id="bulkDelBtn" style="display:none" onclick="bulkDelete()">Delete</button>
        </div>
        <div class="sb-section">Charts</div>
        <div id="sidebarList"></div>
      </div>
    </div>

    <div class="content">
      <div class="panel" id="leftPanel" style="max-width:400px;min-width:290px">
        <div class="tab-row">
          <div class="tab active" id="tab-edit" onclick="switchTab('edit')">Edit</div>
          <div class="tab" id="tab-data" onclick="switchTab('data')">Data Table</div>
          <div class="tab" id="tab-saved" onclick="switchTab('saved')">Saved</div>
        </div>
        <div class="panel-body" id="leftBody">
          <div class="empty"><span style="font-size:36px">📋</span><p>Click <strong>+ New</strong> or import a CSV to begin</p></div>
        </div>
      </div>

      <div class="vdiv"></div>

      <div class="panel" id="rightPanel">
        <div class="panel-header">
          <input class="chart-title-inp" id="chartTitleInp" value="Preview" onchange="renameChart(this.value)" placeholder="Chart title…" title="Click to rename chart"/>
          <div style="margin-left:auto;display:flex;gap:5px;flex-wrap:wrap">
            <button class="btn sm" onclick="exportChart('csv')">CSV</button>
            <button class="btn sm" onclick="exportChart('png')">PNG</button>
            <button class="btn sm" onclick="exportChart('pdf')">PDF</button>
            <button class="btn sm" onclick="exportChart('html')">HTML</button>
            <button class="btn sm accent" onclick="saveCurrentChart()">Save</button>
          </div>
        </div>
        <div class="panel-body" id="rightBody">
          <div class="empty"><span style="font-size:44px">📈</span><p>Create or select a chart to see live preview here</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-ov" id="importModal" style="display:none" onclick="closeModalIf(event,'importModal')">
  <div class="modal">
    <div class="modal-hd">Import CSV <span class="modal-close" onclick="closeModal('importModal')">×</span></div>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('csvFileIn').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
      <div style="font-size:28px;margin-bottom:8px">📄</div>
      <div>Drag &amp; drop CSV here, or <strong>click to browse</strong></div>
      <div style="font-size:11px;margin-top:5px;color:var(--text3)">Any columns: name, age, gender, city, score, date…</div>
    </div>
    <input type="file" id="csvFileIn" accept=".csv,.tsv" style="display:none" onchange="handleCSVFile(this.files[0])"/>
    <div id="csvPreviewArea"></div>
    <div class="modal-ft">
      <button class="btn ghost" onclick="closeModal('importModal')">Cancel</button>
      <button class="btn accent" id="importConfirmBtn" style="display:none" onclick="confirmImport()">Import as Chart</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════ CONSTANTS ═══════════════════ */
const CHART_TYPES=[
  {id:'bar',label:'Bar',icon:'📊'},{id:'line',label:'Line',icon:'📈'},
  {id:'pie',label:'Pie',icon:'🥧'},{id:'doughnut',label:'Donut',icon:'🍩'},
  {id:'polarArea',label:'Polar',icon:'🎯'},{id:'radar',label:'Radar',icon:'🕸'},
  {id:'scatter',label:'Scatter',icon:'⚬'},{id:'bubble',label:'Bubble',icon:'🫧'},
  {id:'area',label:'Area',icon:'🏔'},{id:'horizontalBar',label:'H-Bar',icon:'📉'},
  {id:'stackedBar',label:'Stacked',icon:'🗂'},{id:'stackedLine',label:'S-Line',icon:'〰'},
  {id:'mixed',label:'Mixed',icon:'🔀'},{id:'waterfall',label:'Waterfall',icon:'💧'},
  {id:'funnel',label:'Funnel',icon:'▽'},{id:'gauge',label:'Gauge',icon:'🎚'},
  {id:'heatmap',label:'Heatmap',icon:'🔥'},{id:'treemap',label:'Treemap',icon:'▦'}
];
const PALETTES={
  vivid:['#6366f1','#22d3a5','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#84cc16','#f97316','#ec4899','#14b8a6','#a855f7','#3b82f6'],
  pastel:['#a5b4fc','#6ee7b7','#fcd34d','#fca5a5','#c4b5fd','#67e8f9','#bbf7d0','#fdba74','#f9a8d4','#99f6e4'],
  bold:['#3730a3','#065f46','#92400e','#991b1b','#5b21b6','#164e63','#3f6212','#c2410c','#9d174d','#134e4a'],
  mono:['#e2e8f0','#cbd5e1','#94a3b8','#64748b','#475569','#334155','#1e293b']
};

/* ══════════════════ STATE ═══════════════════ */
let charts=[],currentChart=null,activeCI=null;
let sidebarOpen=true,currentTab='edit',isDark=true;
let csvParsed=null;

/* ══════════════════ STORAGE ═══════════════════ */
function load(){try{charts=JSON.parse(localStorage.getItem('app_charts_data')||'[]')}catch{charts=[]}}
function save(){localStorage.setItem('app_charts_data',JSON.stringify(charts))}

/* ══════════════════ UTILS ═══════════════════ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}
function cols(n,pal){const p=PALETTES[pal]||PALETTES.vivid;return Array.from({length:n},(_,i)=>p[i%p.length])}
function pNum(v){const n=parseFloat(String(v).replace(/[^\d.\-]/g,''));return isNaN(n)?0:n}
function isNumCol(rows,col){return rows.slice(0,20).filter(r=>r[col]!==undefined&&r[col]!=='').every(r=>!isNaN(parseFloat(r[col])))}
function calcStats(vals){const n=vals.filter(v=>v!==null&&!isNaN(v));const s=n.reduce((a,b)=>a+(+b),0);return{sum:Math.round(s*10)/10,avg:n.length?Math.round(s/n.length*10)/10:0,max:n.length?Math.max(...n.map(Number)):0}}
function dlBlob(content,mime,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:mime}));a.download=name;a.click()}

/* ══════════════════ THEME / SIDEBAR ═══════════════════ */
function toggleDark(){isDark=!isDark;document.body.classList.toggle('light',!isDark);document.getElementById('themeBtn').textContent=isDark?'🌙':'☀️'}
function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  const sb=document.getElementById('sidebar');
  if(window.innerWidth<=768){sb.classList.toggle('sb-mobile-open',sidebarOpen);sb.classList.remove('collapsed')}
  else{sb.classList.toggle('collapsed',!sidebarOpen)}
}

/* ══════════════════ SIDEBAR RENDER ═══════════════════ */
function filterCharts(){renderSidebar();if(currentTab==='saved')renderSavedTab()}
function renderSidebar(){
  const q=(document.getElementById('globalSearch').value||'').toLowerCase();
  const list=document.getElementById('sidebarList');
  const filtered=charts.filter(c=>c.name.toLowerCase().includes(q)||c.type.includes(q));
  const anySelected=charts.some(c=>c.selected);
  document.getElementById('bulkDelBtn').style.display=anySelected?'':'none';
  document.getElementById('selectAll').checked=charts.length>0&&charts.every(c=>c.selected);
  const TI=Object.fromEntries(CHART_TYPES.map(t=>[t.id,t]));
  if(!filtered.length){list.innerHTML=`<div style="padding:18px 12px;font-size:12px;color:var(--text3);text-align:center">${charts.length?'No matches':'No charts yet'}</div>`;return}
  list.innerHTML=filtered.map(c=>{
    const ti=TI[c.type]||{icon:'📊'};
    const pts=(c.mode==='multi'?(c.rawRows||[]).length:c.labels.length)||0;
    return`<div class="chart-item ${currentChart&&currentChart.id===c.id?'active':''}" onclick="selectChart('${c.id}')">
      <input type="checkbox" ${c.selected?'checked':''} onclick="event.stopPropagation();toggleSel('${c.id}',this.checked)"/>
      <div class="item-icon">${ti.icon}</div>
      <div class="item-info"><div class="item-name">${esc(c.name)}</div><div class="item-meta">${c.type}·${pts}pts${c.mode==='multi'?' CSV':''}</div></div>
    </div>`;
  }).join('');
}
function toggleSel(id,v){const c=charts.find(x=>x.id===id);if(c)c.selected=v;renderSidebar()}
function toggleSelectAll(){const all=document.getElementById('selectAll').checked;charts.forEach(c=>c.selected=all);renderSidebar()}
function bulkDelete(){
  const n=charts.filter(c=>c.selected).length;if(!n)return;
  charts=charts.filter(c=>!c.selected);
  if(currentChart&&!charts.find(x=>x.id===currentChart.id)){currentChart=null;clearPanels()}
  save();renderSidebar();toast(`Deleted ${n} chart${n>1?'s':''}`, 'error');
}
function clearPanels(){
  document.getElementById('rightBody').innerHTML=emptyH('Select a chart to preview');
  document.getElementById('leftBody').innerHTML=emptyH('Select or create a chart');
  document.getElementById('chartTitleInp').value='Preview';
}
function emptyH(msg){return`<div class="empty"><span style="font-size:36px">📉</span><p>${msg}</p></div>`}

/* ══════════════════ CHART CRUD ═══════════════════ */
function newChart(){
  const c=makeChart('Chart '+(charts.length+1));
  charts.unshift(c);save();selectChart(c.id);switchTab('edit');renderSidebar();
  toast('Chart created','success');
}
function makeChart(name){
  return{
    id:uid(),name,type:'bar',title:name,palette:'vivid',
    created:new Date().toLocaleDateString(),selected:false,
    mode:'simple',
    labels:['Jan','Feb','Mar','Apr','May','Jun'],
    values:[42,78,35,90,56,67],
    rawHeaders:[],rawRows:[],
    xCol:'',yCols:[],groupCol:'',aggregation:'sum'
  };
}
function selectChart(id){
  currentChart=charts.find(c=>c.id===id);
  if(!currentChart)return;
  renderSidebar();
  if(currentTab==='saved')switchTab('edit');
  else renderEditPanel();
  renderPreview();
}
function renameChart(v){
  if(!currentChart)return;
  currentChart.name=v||'Untitled';
  currentChart.title=v||'Untitled';
  save();renderSidebar();
}
function saveCurrentChart(){if(!currentChart)return;save();renderSidebar();if(currentTab==='saved')renderSavedTab();toast('Saved!','success')}
function cloneById(id){
  const src=charts.find(c=>c.id===id);if(!src)return;
  const clone=JSON.parse(JSON.stringify(src));clone.id=uid();clone.name=src.name+' (copy)';clone.selected=false;
  charts.unshift(clone);save();selectChart(clone.id);renderSidebar();toast('Cloned');
}
function deleteById(id){
  charts=charts.filter(c=>c.id!==id);
  if(currentChart&&currentChart.id===id){currentChart=null;clearPanels()}
  save();renderSidebar();if(currentTab==='saved')renderSavedTab();toast('Deleted','error');
}

/* ══════════════════ TABS ═══════════════════ */
function switchTab(tab){
  currentTab=tab;
  ['edit','data','saved'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===tab));
  if(tab==='edit')renderEditPanel();
  else if(tab==='data')renderDataTab();
  else renderSavedTab();
}

/* ══════════════════ EDIT PANEL ═══════════════════ */
function renderEditPanel(){
  const body=document.getElementById('leftBody');
  if(!currentChart){body.innerHTML=emptyH('Create or select a chart');return}
  const c=currentChart;
  const tg=CHART_TYPES.map(t=>`<button class="ct-btn ${c.type===t.id?'active':''}" onclick="setType('${t.id}')"><span class="ct-icon">${t.icon}</span>${t.label}</button>`).join('');
  const sw=Object.keys(PALETTES).map(k=>`<span class="swatch ${k===c.palette?'on':''}" style="background:${PALETTES[k][0]};box-shadow:4px 0 0 ${PALETTES[k][1]},8px 0 0 ${PALETTES[k][2]||PALETTES[k][0]}" onclick="setPalette('${k}')" title="${k}"></span>`).join('');
  const isM=c.mode==='multi'&&c.rawHeaders.length>0;

  let dataSection='';
  if(!isM){
    const trs=c.labels.map((l,i)=>`<tr><td><input value="${esc(l)}" onchange="updLabel(${i},this.value)"/></td><td><input type="number" value="${c.values[i]||0}" onchange="updVal(${i},parseFloat(this.value)||0)"/></td><td><button class="row-del" onclick="delRow(${i})">×</button></td></tr>`).join('');
    dataSection=`<div class="sec"><div class="sec-title">Data points</div>
      <table class="dtbl" style="margin-bottom:8px"><thead><tr><th>Label</th><th>Value</th><th></th></tr></thead><tbody>${trs}</tbody></table>
      <button class="btn sm" onclick="addRow()" style="width:100%">+ Add row</button></div>`;
  } else {
    dataSection=buildAxisUI(c);
    dataSection+=`<div class="sec"><div class="sec-title">Aggregation</div>
      <div class="field-row"><label>Method</label><select class="fi" onchange="currentChart.aggregation=this.value;renderPreview()">
        ${['sum','avg','count','min','max'].map(a=>`<option value="${a}" ${c.aggregation===a?'selected':''}>${a.charAt(0).toUpperCase()+a.slice(1)}</option>`).join('')}
      </select></div></div>`;
  }

  body.innerHTML=`
    <div class="sec"><div class="sec-title">Info</div>
      <div class="field-row"><label>Name</label><input class="fi" value="${esc(c.name)}" onchange="currentChart.name=this.value;document.getElementById('chartTitleInp').value=this.value;save();renderSidebar()"/></div>
      <div class="field-row"><label>Title</label><input class="fi" value="${esc(c.title)}" onchange="currentChart.title=this.value;renderPreview();save()"/></div>
    </div>
    <div class="sec"><div class="sec-title">Chart type</div><div class="ct-grid">${tg}</div></div>
    <div class="sec"><div class="sec-title">Palette</div><div class="swatch-row">${sw}</div></div>
    ${dataSection}
    <div class="sec"><div class="sec-title">Actions</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn sm" onclick="cloneById('${c.id}')">Clone</button>
        <button class="btn sm accent" onclick="saveCurrentChart()">Save</button>
        <button class="btn sm danger" onclick="deleteById('${c.id}')">Delete</button>
      </div>
    </div>`;
}

function buildAxisUI(c){
  const headers=c.rawHeaders;
  const numCols=headers.filter(h=>isNumCol(c.rawRows,h));
  const xChip=c.xCol?`<span class="ax-chip x">${esc(c.xCol)} <span class="ax-chip-x" onclick="currentChart.xCol='';renderEditPanel();renderPreview()">×</span></span>`:`<span style="font-size:11px;color:var(--text3)">not set</span>`;
  const yChips=(c.yCols||[]).map(col=>`<span class="ax-chip y">${esc(col)} <span class="ax-chip-x" onclick="rmYCol('${col}')">×</span></span>`).join('')||`<span style="font-size:11px;color:var(--text3)">not set</span>`;
  const grpChip=c.groupCol?`<span class="ax-chip grp">${esc(c.groupCol)} <span class="ax-chip-x" onclick="currentChart.groupCol='';renderEditPanel();renderPreview()">×</span></span>`:`<span style="font-size:11px;color:var(--text3)">none</span>`;

  return`<div class="sec">
    <div class="sec-title">Axis mapping</div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Columns (click to quick-assign X then Y):</div>
    <div class="col-pill-row">${headers.map(h=>`<span class="col-pill" onclick="quickAssign('${h}')">${esc(h)}</span>`).join('')}</div>
    <div class="field-row"><label style="min-width:60px;font-size:11px">X axis</label>
      <select class="fi" onchange="currentChart.xCol=this.value;renderEditPanel();renderPreview()">
        <option value="">— pick —</option>
        ${headers.map(h=>`<option value="${esc(h)}" ${c.xCol===h?'selected':''}>${esc(h)}</option>`).join('')}
      </select>
    </div>
    <div class="field-row"><label style="min-width:60px;font-size:11px">Y value(s)</label>
      <select class="fi" onchange="addYCol(this.value);this.value=''">
        <option value="">+ add Y col</option>
        ${numCols.filter(h=>!(c.yCols||[]).includes(h)).map(h=>`<option value="${esc(h)}">${esc(h)}</option>`).join('')}
      </select>
    </div>
    <div class="field-row"><label style="min-width:60px;font-size:11px">Group by</label>
      <select class="fi" onchange="currentChart.groupCol=this.value;renderEditPanel();renderPreview()">
        <option value="">— none —</option>
        ${headers.filter(h=>!(c.yCols||[]).includes(h)).map(h=>`<option value="${esc(h)}" ${c.groupCol===h?'selected':''}>${esc(h)}</option>`).join('')}
      </select>
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--text3);margin-bottom:3px">Current:</div>
    <div style="margin-bottom:3px"><span style="font-size:10px;color:var(--accent2)">X:</span> ${xChip}</div>
    <div style="margin-bottom:3px"><span style="font-size:10px;color:var(--success)">Y:</span> ${yChips}</div>
    <div><span style="font-size:10px;color:var(--warn)">Group:</span> ${grpChip}</div>
  </div>`;
}

function quickAssign(col){
  if(!currentChart)return;
  if(!currentChart.xCol){currentChart.xCol=col;}
  else if(!(currentChart.yCols||[]).includes(col)&&col!==currentChart.xCol){
    if(!currentChart.yCols)currentChart.yCols=[];
    if(isNumCol(currentChart.rawRows,col))currentChart.yCols.push(col);
    else if(!currentChart.groupCol)currentChart.groupCol=col;
  }
  renderEditPanel();renderPreview();
}
function addYCol(col){if(!col||!currentChart)return;if(!currentChart.yCols)currentChart.yCols=[];if(!currentChart.yCols.includes(col))currentChart.yCols.push(col);renderEditPanel();renderPreview()}
function rmYCol(col){if(!currentChart)return;currentChart.yCols=(currentChart.yCols||[]).filter(c=>c!==col);renderEditPanel();renderPreview()}

/* ══════════════════ DATA TABLE TAB ═══════════════════ */
function renderDataTab(){
  const body=document.getElementById('leftBody');
  if(!currentChart){body.innerHTML=emptyH('Select a chart');return}
  const c=currentChart;
  const isM=c.mode==='multi'&&c.rawHeaders.length>0;

  if(!isM){
    const trs=c.labels.map((l,i)=>`<tr><td><input value="${esc(l)}" onchange="updLabel(${i},this.value)"/></td><td><input type="number" value="${c.values[i]||0}" onchange="updVal(${i},parseFloat(this.value)||0)"/></td><td><button class="row-del" onclick="delRow(${i})">×</button></td></tr>`).join('');
    body.innerHTML=`<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      <button class="btn sm" onclick="addRow()">+ Row</button>
      <button class="btn sm" onclick="exportChart('csv')">Export CSV</button>
    </div>
    <table class="dtbl"><thead><tr><th>Label</th><th>Value</th><th></th></tr></thead><tbody>${trs}</tbody></table>`;
    return;
  }

  const PAGE=100;
  const displayRows=c.rawRows.slice(0,PAGE);
  const thCells=c.rawHeaders.map(h=>`<th>${esc(h)}</th>`).join('');
  const trs=displayRows.map((row,ri)=>{
    const tds=c.rawHeaders.map(h=>`<td><input value="${esc(row[h]||'')}" onchange="updCell(${ri},'${h.replace(/'/g,"\\'")}',this.value)"/></td>`).join('');
    return`<tr>${tds}<td><button class="row-del" onclick="delRawRow(${ri})">×</button></td></tr>`;
  }).join('');

  body.innerHTML=`<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
    <button class="btn sm" onclick="addRawRow()">+ Row</button>
    <button class="btn sm" onclick="addRawCol()">+ Col</button>
    <button class="btn sm" onclick="exportChart('csv')">Export CSV</button>
    ${c.rawRows.length>PAGE?`<span style="font-size:11px;color:var(--text3);align-self:center">First ${PAGE} of ${c.rawRows.length}</span>`:''}
  </div>
  <div style="overflow-x:auto">
  <table class="dtbl"><thead><tr>${thCells}<th></th></tr></thead><tbody>${trs}</tbody></table>
  </div>`;
}
function updCell(ri,col,val){if(!currentChart)return;if(currentChart.rawRows[ri])currentChart.rawRows[ri][col]=val;save();renderPreview()}
function addRawRow(){if(!currentChart)return;const e={};currentChart.rawHeaders.forEach(h=>e[h]='');currentChart.rawRows.push(e);save();renderDataTab();renderPreview()}
function delRawRow(i){if(!currentChart)return;currentChart.rawRows.splice(i,1);save();renderDataTab();renderPreview()}
function addRawCol(){if(!currentChart)return;const name=prompt('Column name:');if(!name)return;currentChart.rawHeaders.push(name);currentChart.rawRows.forEach(r=>r[name]='');save();renderDataTab();renderEditPanel()}

/* ══════════════════ SIMPLE DATA ═══════════════════ */
function setType(t){if(!currentChart)return;currentChart.type=t;save();renderEditPanel();renderPreview()}
function setPalette(p){if(!currentChart)return;currentChart.palette=p;save();renderEditPanel();renderPreview()}
function updLabel(i,v){if(!currentChart)return;currentChart.labels[i]=v;save();renderPreview()}

/* ══════════════════ MULTI-COL PROCESSING ═══════════════════ */
function buildMultiData(c){
  const rows=c.rawRows,xCol=c.xCol,yCols=c.yCols||[],groupCol=c.groupCol||'',agg=c.aggregation||'sum';
  if(!xCol){return{labels:[],datasets:[]}}

  const xVals=[...new Set(rows.map(r=>String(r[xCol]||'')))].filter(Boolean);

  if(groupCol&&yCols.length===1){
    // GROUP BY → one dataset per group value
    const yCol=yCols[0];
    const groups=[...new Set(rows.map(r=>String(r[groupCol]||'')))].filter(Boolean);
    const datasets=groups.map((grp,gi)=>({
      label:grp,
      data:xVals.map(xv=>{
        const m=rows.filter(r=>String(r[xCol]||'')===xv&&String(r[groupCol]||'')===grp);
        return doAgg(m.map(r=>pNum(r[yCol])),agg);
      }),
      _gi:gi
    }));
    return{labels:xVals,datasets};
  }

  if(yCols.length>1){
    // MULTI Y → one dataset per Y column (supports 2-3+ Y on same X)
    const datasets=yCols.map((yCol,gi)=>({
      label:yCol,
      data:xVals.map(xv=>{
        const m=rows.filter(r=>String(r[xCol]||'')===xv);
        return doAgg(m.map(r=>pNum(r[yCol])),agg);
      }),
      _gi:gi
    }));
    return{labels:xVals,datasets};
  }

  if(yCols.length===1){
    const yCol=yCols[0];
    return{labels:xVals,datasets:[{label:yCol,data:xVals.map(xv=>{
      const m=rows.filter(r=>String(r[xCol]||'')===xv);
      return doAgg(m.map(r=>pNum(r[yCol])),agg);
    }),_gi:0}]};
  }

  return{labels:[],datasets:[]};
}
function doAgg(nums,method){
  if(!nums.length)return 0;
  switch(method){
    case'avg':return Math.round(nums.reduce((a,b)=>a+b,0)/nums.length*100)/100;
    case'count':return nums.length;
    case'min':return Math.min(...nums);
    case'max':return Math.max(...nums);
    default:return Math.round(nums.reduce((a,b)=>a+b,0)*100)/100;
  }
}

/* ══════════════════ PREVIEW ═══════════════════ */
function renderPreview(){
  const body=document.getElementById('rightBody');
  if(!currentChart)return;
  const c=currentChart;
  document.getElementById('chartTitleInp').value=c.title||c.name;
  if(activeCI){try{activeCI.destroy()}catch(e){}activeCI=null}

  let labels,mds=null;
  if(c.mode==='multi'&&c.rawHeaders.length>0){
    const built=buildMultiData(c);
    labels=built.labels;mds=built.datasets;
    if(!labels.length){
      body.innerHTML=`<div class="empty"><span style="font-size:30px">⚙️</span><p>Set X axis + Y columns in Edit tab to generate chart</p></div>`;return;
    }
  } else {
    labels=c.labels;
  }

  const values=mds?mds[0].data:c.values;
  const s=calcStats(values);
  const statHtml=`<div class="stat-grid">
    <div class="stat-card"><div class="stat-lbl">Sum</div><div class="stat-val">${s.sum}</div></div>
    <div class="stat-card"><div class="stat-lbl">Avg</div><div class="stat-val">${s.avg}</div></div>
    <div class="stat-card"><div class="stat-lbl">Max</div><div class="stat-val">${s.max}</div></div>
  </div>`;

  if(['waterfall','funnel','gauge','heatmap','treemap'].includes(c.type)){
    body.innerHTML=statHtml+renderSVG(c,labels,values);return;
  }

  // Build datasets
  let datasets;
  if(mds&&mds.length>0){
    const palette=cols(mds.length,c.palette);
    datasets=mds.map((ds,gi)=>makeCJSDataset(ds.label,ds.data,palette[gi],c.type));
  } else {
    const palette=cols(labels.length,c.palette);
    datasets=[makeCJSDataset(c.title||'Data',values,palette,c.type,true)];
  }

  // Legend
  const legendItems=mds&&mds.length>1
    ?mds.map((ds,gi)=>({label:ds.label,color:cols(mds.length,c.palette)[gi]}))
    :labels.slice(0,12).map((l,i)=>({label:l,color:cols(labels.length,c.palette)[i]}));
  const legendHtml=`<div class="legend-row">${legendItems.map(li=>`<div class="legend-item"><div class="legend-dot" style="background:${li.color}"></div>${esc(li.label)}</div>`).join('')}</div>`;

  const cH=c.type==='horizontalBar'?Math.max(220,labels.length*44+60):300;
  const subMsg=[
    c.type,
    mds&&mds.length>1?mds.length+' series':'',
    c.groupCol?'grouped by '+c.groupCol:'',
    c.mode==='multi'&&c.yCols.length>1?c.yCols.length+' Y cols':''
  ].filter(Boolean).join(' · ');

  body.innerHTML=`${statHtml}<div class="chart-wrap">
    <div class="chart-title-d">${esc(c.title||c.name)}</div>
    <div class="chart-sub">${subMsg}</div>
    ${legendHtml}
    <div class="canvas-wrap" style="height:${cH}px">
      <canvas id="mainCanvas" role="img" aria-label="${esc(c.title)} chart"></canvas>
    </div>
  </div>`;

  const ctx=document.getElementById('mainCanvas').getContext('2d');
  try{activeCI=new Chart(ctx,buildCJSConfig(c.type,labels,datasets,mds))}catch(e){console.error(e)}
}

function makeCJSDataset(label,data,color,type,perBar=false){
  const isRound=['pie','doughnut','polarArea'].includes(type);
  const bg=isRound?(Array.isArray(color)?color.map(c=>c+'cc'):data.map((_,i)=>{const p=PALETTES.vivid;return p[i%p.length]+'cc'})): (Array.isArray(color)?color[0]+'99':color+'99');
  const bc=Array.isArray(color)?color[0]:color;
  return{label,data,backgroundColor:isRound&&perBar?data.map((_,i)=>{const p=PALETTES.vivid;return p[i%p.length]+'cc'}):bg,borderColor:bc,borderWidth:1.5,borderRadius:4,tension:0.4,fill:type==='area',pointRadius:4};
}

function buildCJSConfig(type,labels,datasets,mds){
  const sc={x:{grid:{color:'rgba(128,128,160,0.07)'},ticks:{color:'#9ba3c4',maxTicksLimit:14}},y:{grid:{color:'rgba(128,128,160,0.07)'},ticks:{color:'#9ba3c4'}}};
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:sc};
  const noSc={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};
  switch(type){
    case'pie':case'doughnut':return{type,data:{labels,datasets},options:noSc};
    case'polarArea':return{type,data:{labels,datasets},options:noSc};
    case'radar':return{type,data:{labels,datasets},options:{...noSc,scales:{r:{grid:{color:'rgba(128,128,160,0.1)'},ticks:{color:'#9ba3c4'}}}}};
    case'scatter':return{type:'scatter',data:{datasets:datasets.map(ds=>({...ds,data:ds.data.map((v,i)=>({x:i+1,y:v})),pointRadius:7}))},options:{...base,layout:{padding:20}}};
    case'bubble':return{type:'bubble',data:{datasets:datasets.map(ds=>({...ds,data:ds.data.map((v,i)=>({x:i+1,y:v,r:Math.max(4,Math.min(20,Math.abs(v)/5))}))}))},options:{...base,layout:{padding:24}}};
    case'area':return{type:'line',data:{labels,datasets:datasets.map(ds=>({...ds,fill:true}))},options:base};
    case'horizontalBar':return{type:'bar',data:{labels,datasets},options:{...base,indexAxis:'y'}};
    case'stackedBar':return{type:'bar',data:{labels,datasets:datasets.map(ds=>({...ds,stack:'s'}))},options:{...base,scales:{x:{...sc.x,stacked:true},y:{...sc.y,stacked:true}}}};
    case'stackedLine':return{type:'line',data:{labels,datasets:datasets.map(ds=>({...ds,fill:true}))},options:{...base,scales:{x:sc.x,y:{...sc.y,stacked:true}}}};
    case'mixed':return{type:'bar',data:{labels,datasets:[
        {...datasets[0],type:'bar',borderRadius:4,borderWidth:0},
        {...(datasets[1]||datasets[0]),type:'line',fill:false,tension:0.4,backgroundColor:'transparent',borderWidth:2.5,borderRadius:0}
      ]},options:base};
    default:return{type:type==='line'?'line':'bar',data:{labels,datasets},options:base};
  }
}

/* ══════════════════ SVG CHARTS ═══════════════════ */
function renderSVG(c,labels,values){
  const palette=cols(labels.length,c.palette);
  const max=Math.max(...values)||1;
  const wrap=h=>`<div class="chart-wrap"><div class="chart-title-d">${esc(c.title||c.name)}</div><div class="chart-sub">${c.type}</div>${h}</div>`;

  if(c.type==='gauge'){
    const avg=values.reduce((a,b)=>a+b,0)/(values.length||1),pct=Math.min(1,avg/max);
    const r=88,cx=160,cy=128,ang=Math.PI*pct;
    const x=cx+r*Math.cos(Math.PI-ang),y=cy-r*Math.sin(Math.PI-ang);
    return wrap(`<svg viewBox="0 0 320 165" width="100%">
      <path d="M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="var(--bg4)" stroke-width="17" stroke-linecap="round"/>
      <path d="M${cx-r} ${cy} A${r} ${r} 0 0 1 ${x} ${y}" fill="none" stroke="${palette[0]}" stroke-width="17" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="5" fill="${palette[0]}"/>
      <text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="26" font-weight="600" fill="var(--text)" font-family="DM Mono,monospace">${Math.round(avg)}</text>
      <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="12" fill="var(--text2)">${Math.round(pct*100)}% of max ${Math.round(max)}</text>
    </svg>`);
  }
  if(c.type==='funnel'){
    const W=460,bH=38,gap=8,pL=110,tH=labels.length*(bH+gap)+24;
    return wrap(`<svg viewBox="0 0 ${W} ${tH}" width="100%">${labels.map((l,i)=>{const fw=(W-pL-20)*(values[i]/max),fx=pL+(W-pL-20-fw)/2,y=12+i*(bH+gap);return`<rect x="${fx}" y="${y}" width="${fw}" height="${bH}" rx="5" fill="${palette[i]}" opacity=".9"/><text x="${pL-8}" y="${y+bH/2+4}" text-anchor="end" font-size="12" fill="var(--text2)">${esc(l)}</text><text x="${fx+fw/2}" y="${y+bH/2+5}" text-anchor="middle" font-size="12" font-weight="500" fill="#fff">${values[i]}</text>`;}).join('')}</svg>`);
  }
  if(c.type==='waterfall'){
    const W=460,bH=36,gap=8,pL=110,tH=labels.length*(bH+gap)+24;
    let run=0;
    return wrap(`<svg viewBox="0 0 ${W} ${tH}" width="100%">${labels.map((l,i)=>{const bw=(W-pL-20)*(values[i]/max),bx=pL+(W-pL-20)*(run/max);run+=values[i];const y=12+i*(bH+gap);return`<rect x="${bx}" y="${y}" width="${bw}" height="${bH}" rx="5" fill="${palette[i]}" opacity=".9"/><text x="${pL-8}" y="${y+bH/2+4}" text-anchor="end" font-size="12" fill="var(--text2)">${esc(l)}</text><text x="${bx+bw/2}" y="${y+bH/2+5}" text-anchor="middle" font-size="11" fill="#fff">${values[i]}</text>`;}).join('')}</svg>`);
  }
  if(c.type==='heatmap'){
    const n=labels.length,nc=Math.min(n,Math.ceil(Math.sqrt(n*2))),nr=Math.ceil(n/nc),cw=70,ch=48;
    const cells=labels.map((l,i)=>{const col2=i%nc,row=Math.floor(i/nc),ratio=values[i]/max,ci=Math.min(palette.length-1,Math.floor(ratio*(palette.length-1))),y=10+row*(ch+4),x=10+col2*(cw+4);return`<rect x="${x}" y="${y}" width="${cw}" height="${ch}" rx="6" fill="${palette[ci]}" fill-opacity="${(ratio*.75+.15).toFixed(2)}"/><text x="${x+cw/2}" y="${y+ch/2-4}" text-anchor="middle" font-size="10" fill="var(--text2)">${esc(l)}</text><text x="${x+cw/2}" y="${y+ch/2+10}" text-anchor="middle" font-size="13" font-weight="600" fill="var(--text)">${values[i]}</text>`;}).join('');
    return wrap(`<svg viewBox="0 0 ${10+nc*(cw+4)} ${10+nr*(ch+4)+10}" width="100%">${cells}</svg>`);
  }
  if(c.type==='treemap'){
    const total=values.reduce((a,b)=>a+b,0)||1,W=460,H=200;let x=0;
    return wrap(`<svg viewBox="0 0 ${W} ${H}" width="100%">${labels.map((l,i)=>{const w=Math.max(2,(values[i]/total)*W);const r=`<rect x="${x}" y="0" width="${w-2}" height="${H}" rx="6" fill="${palette[i]}"/>${w>45?`<text x="${x+w/2-1}" y="${H/2-6}" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">${esc(l)}</text><text x="${x+w/2-1}" y="${H/2+9}" text-anchor="middle" font-size="11" fill="rgba(255,255,255,.85)">${values[i]}</text>`:''}`; x+=w; return r;}).join('')}</svg>`);
  }
  return wrap('<p style="color:var(--text3);font-size:13px">Rendering…</p>');
}

/* ══════════════════ CSV IMPORT ═══════════════════ */
function openImportModal(){
  document.getElementById('importModal').style.display='flex';
  document.getElementById('csvPreviewArea').innerHTML='';
  document.getElementById('importConfirmBtn').style.display='none';
  document.getElementById('csvFileIn').value='';
  csvParsed=null;
}
function closeModal(id){document.getElementById(id).style.display='none'}
function closeModalIf(e,id){if(e.target.id===id)closeModal(id)}
function handleDrop(e){e.preventDefault();document.getElementById('uploadArea').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)handleCSVFile(f)}
function handleCSVFile(file){if(!file)return;const r=new FileReader();r.onload=ev=>parseCSVText(ev.target.result,file.name);r.readAsText(file)}

function parseCSVText(text,filename){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){toast('CSV needs at least 2 rows','error');return}
  const delims=[',',';','\t','|'];
  const first=lines[0];
  const delim=delims.reduce((best,d)=>first.split(d).length>first.split(best).length?d:best,',');
  function parseLine(line){
    const res=[];let cur='',inQ=false;
    for(const ch of line){if(ch==='"'){inQ=!inQ}else if(ch===delim&&!inQ){res.push(cur.trim());cur=''}else cur+=ch}
    res.push(cur.trim());return res;
  }
  const headers=parseLine(lines[0]);
  const rows=lines.slice(1).map(line=>{
    const vals=parseLine(line);const obj={};
    headers.forEach((h,i)=>obj[h]=vals[i]||'');return obj;
  }).filter(r=>Object.values(r).some(v=>v!==''));
  csvParsed={headers,rows,filename:filename||'import.csv'};
  const previewRows=rows.slice(0,6);
  document.getElementById('csvPreviewArea').innerHTML=`
    <div style="margin:10px 0 5px;font-size:12px;color:var(--text2)"><strong>${rows.length}</strong> rows · <strong>${headers.length}</strong> columns${rows.length>6?` (showing first 6)`:''}:</div>
    <div style="overflow-x:auto"><table class="csv-prev-tbl"><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
    <tbody>${previewRows.map(r=>`<tr>${headers.map(h=>`<td>${esc(r[h]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
  document.getElementById('importConfirmBtn').style.display='';
}

function confirmImport(){
  if(!csvParsed)return;
  const{headers,rows,filename}=csvParsed;
  const name=filename.replace(/\.(csv|tsv)$/i,'');
  const numCols=headers.filter(h=>isNumCol(rows,h));
  const txtCols=headers.filter(h=>!numCols.includes(h));
  const c=makeChart(name);
  c.mode='multi';
  c.rawHeaders=[...headers];
  c.rawRows=rows.map(r=>({...r}));
  c.xCol=txtCols[0]||headers[0]||'';
  c.yCols=numCols.slice(0,3);
  c.groupCol='';
  c.aggregation='sum';
  c.title=name;
  charts.unshift(c);save();
  closeModal('importModal');
  selectChart(c.id);switchTab('edit');renderSidebar();
  toast(`Imported "${name}" — ${rows.length} rows, ${headers.length} cols`,'success');
}

/* ══════════════════ EXPORT ═══════════════════ */
function exportChart(format){
  if(!currentChart){toast('Select a chart first','error');return}
  const c=currentChart;
  const canvas=document.getElementById('mainCanvas');

  if(format==='csv'){
    let csvText='';
    if(c.mode==='multi'&&c.rawHeaders.length){
      csvText=c.rawHeaders.join(',')+'\n'+c.rawRows.map(r=>c.rawHeaders.map(h=>`"${String(r[h]||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    } else {
      csvText='Label,Value\n'+c.labels.map((l,i)=>`"${String(l).replace(/"/g,'""')}",${c.values[i]}`).join('\n');
    }
    dlBlob(csvText,'text/csv',c.name.replace(/\s+/g,'_')+'.csv');
    toast('CSV exported','success');return;
  }
  if(format==='png'){
    if(!canvas){toast('PNG: canvas charts only','error');return}
    const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=c.name.replace(/\s+/g,'_')+'.png';a.click();
    toast('PNG downloaded','success');return;
  }
  if(format==='pdf'){
    if(!canvas){toast('PDF: canvas charts only','error');return}
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF('landscape','mm','a4');
    pdf.setFontSize(18);pdf.text(c.title||c.name,14,16);
    pdf.setFontSize(10);pdf.setTextColor(150);
    pdf.text(`Type: ${c.type}  ·  Points: ${c.labels.length}  ·  ${c.created}`,14,24);
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',14,28,265,140);
    pdf.save(c.name.replace(/\s+/g,'_')+'.pdf');
    toast('PDF downloaded','success');return;
  }
  if(format==='html'){
    const img=canvas?canvas.toDataURL('image/png'):'';
    let tableHtml='';
    if(c.mode==='multi'&&c.rawHeaders.length){
      tableHtml=`<table><thead><tr>${c.rawHeaders.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${c.rawRows.slice(0,500).map(r=>`<tr>${c.rawHeaders.map(h=>`<td>${esc(r[h]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
    } else {
      tableHtml=`<table><thead><tr><th>Label</th><th>Value</th></tr></thead><tbody>${c.labels.map((l,i)=>`<tr><td>${esc(l)}</td><td>${c.values[i]}</td></tr>`).join('')}</tbody></table>`;
    }
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>${esc(c.title||c.name)}</title><style>body{font-family:system-ui,sans-serif;padding:36px;max-width:960px;margin:0 auto;color:#111}h1{font-size:22px;margin-bottom:3px}.meta{color:#888;font-size:12px;margin-bottom:20px}img{max-width:100%;border:1px solid #eee;border-radius:8px;margin-bottom:20px}table{width:100%;border-collapse:collapse;font-size:13px;margin-top:20px}th,td{text-align:left;padding:6px 10px;border-bottom:1px solid #eee}th{font-size:11px;text-transform:uppercase;color:#888}</style></head><body><h1>${esc(c.title||c.name)}</h1><p class="meta">${c.type}·${c.created}</p>${img?`<img src="${img}"/>`:''}${tableHtml}</body></html>`;
    dlBlob(html,'text/html',c.name.replace(/\s+/g,'_')+'.html');
    toast('HTML downloaded','success');
  }
}
function exportAll(){
  if(!charts.length){toast('No charts','error');return}
  const rows=charts.map(c=>
    `<section style="margin-bottom:32px;padding-bottom:32px;border-bottom:1px solid #eee"><h2>${esc(c.name)}</h2><p style="color:#888;font-size:12px">${c.type}·${(c.rawRows||[]).length||c.labels.length}pts·${c.created}</p></section>`
  ).join('');
  dlBlob(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>All Charts</title><style>body{font-family:system-ui;padding:36px;max-width:900px;margin:0 auto}</style></head><body><h1>All Charts (${charts.length})</h1>${rows}</body></html>`,'text/html','all_charts.html');
  toast(`Exported ${charts.length} charts`,'success');
}

load();renderSidebar();
if(charts.length){currentChart=charts[0];renderEditPanel();renderPreview()}
