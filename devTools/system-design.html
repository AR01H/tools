<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Design Diagram Generator</title>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f3f5ff;
      --bg2: #e8ebfb;
      --surf: #fff;
      --surf2: #f0f2fc;
      --surf3: #e4e8f8;
      --bdr: rgba(0, 0, 0, 0.07);
      --bdr2: rgba(0, 0, 0, 0.12);
      --txt: #141628;
      --txt2: #555875;
      --txt3: #9fa3c0;
      --acc: #6366f1;
      --acc2: #4f52d4;
      --sh: 0 2px 16px rgba(0, 0, 0, 0.07);
      --r: 12px;
    }

    [data-theme="dark"] {
      --bg: #090b14;
      --bg2: #0d1020;
      --surf: #111420;
      --surf2: #161a2c;
      --surf3: #1c2138;
      --bdr: rgba(255, 255, 255, 0.06);
      --bdr2: rgba(255, 255, 255, 0.11);
      --txt: #dde0f5;
      --txt2: #626882;
      --txt3: #2c3050;
      --acc: #818cf8;
      --acc2: #6366f1;
      --sh: 0 4px 28px rgba(0, 0, 0, 0.45);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh
    }

    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 24px;
      background: var(--surf);
      border-bottom: 1px solid var(--bdr);
      box-shadow: var(--sh);
      position: sticky;
      top: 0;
      z-index: 100
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 11px
    }

    .logo-ico {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--acc), #a78bfa);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -.3px
    }

    .hdr-r {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .tog {
      width: 48px;
      height: 25px;
      background: var(--surf2);
      border: 1px solid var(--bdr2);
      border-radius: 20px;
      cursor: pointer;
      position: relative
    }

    .tok {
      width: 19px;
      height: 19px;
      border-radius: 50%;
      background: var(--acc);
      position: absolute;
      top: 2px;
      left: 3px;
      transition: transform .22s;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    [data-theme="dark"] .tok {
      transform: translateX(23px)
    }

    .btn {
      font-family: 'Sora', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 15px;
      border-radius: 8px;
      border: 1px solid var(--bdr2);
      cursor: pointer;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--surf2);
      color: var(--txt)
    }

    .btn:hover {
      background: var(--surf3)
    }

    .btn-acc {
      background: var(--acc);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 3px 12px rgba(99, 102, 241, .3)
    }

    .btn-acc:hover {
      background: var(--acc2)
    }

    /* TWO PANE */
    .wrap {
      display: flex;
      height: calc(100vh - 57px)
    }

    .left {
      width: 320px;
      flex-shrink: 0;
      background: var(--surf);
      border-right: 1px solid var(--bdr);
      display: flex;
      flex-direction: column;
      overflow-y: auto
    }

    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    /* SIDEBAR */
    .si-sect {
      padding: 16px
    }

    .si-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--txt3);
      margin-bottom: 8px
    }

    textarea {
      width: 100%;
      resize: vertical;
      background: var(--surf2);
      border: 1px solid var(--bdr2);
      border-radius: 8px;
      color: var(--txt);
      font-family: 'Sora', sans-serif;
      font-size: 12.5px;
      line-height: 1.6;
      padding: 12px;
      outline: none;
      transition: border-color .2s;
      min-height: 130px;
      display: block
    }

    textarea:focus {
      border-color: var(--acc)
    }

    textarea::placeholder {
      color: var(--txt3)
    }

    .si-divider {
      height: 1px;
      background: var(--bdr);
      margin: 4px 16px
    }

    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      padding: 12px 16px
    }

    .preset-btn {
      font-family: 'Sora', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--bdr2);
      background: var(--surf2);
      color: var(--txt2);
      cursor: pointer;
      transition: all .15s;
      text-align: left
    }

    .preset-btn:hover {
      background: var(--surf3);
      color: var(--txt)
    }

    /* NODE PALETTE */
    .palette {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 16px 12px
    }

    .pal-node {
      font-size: 11px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: grab;
      border: 1px solid;
      transition: all .15s;
      user-select: none
    }

    .pal-node:hover {
      transform: scale(1.05)
    }

    .pal-node:active {
      cursor: grabbing
    }

    /* CANVAS AREA */
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: default
    }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surf);
      border-bottom: 1px solid var(--bdr)
    }

    .tool-sep {
      width: 1px;
      height: 20px;
      background: var(--bdr2);
      margin: 0 2px
    }

    select {
      font-family: 'Sora', sans-serif;
      background: var(--surf2);
      border: 1px solid var(--bdr2);
      border-radius: 7px;
      color: var(--txt);
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
      cursor: pointer
    }

    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bdr2);
      border-radius: 5px
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      background: var(--surf);
      border: 1px solid var(--bdr2);
      border-left: 3px solid var(--acc);
      color: var(--txt);
      font-size: 12px;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 8px;
      box-shadow: var(--sh);
      animation: fup .25s ease;
      font-family: 'Sora', sans-serif
    }

    @keyframes fup {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }
  </style>
</head>

<body>
  <div class="hdr">
    <div class="logo">
      <div class="logo-ico">🗺</div>
      <div class="logo-name">System Design Diagram</div>
    </div>
    <div class="hdr-r">
      <button class="btn btn-acc" onclick="downloadDiagram()">📥 Export PNG</button>
      <button class="btn" onclick="clearCanvas()">Clear</button>
      <div class="tog" onclick="toggleTheme()">
        <div class="tok" id="tok">☀️</div>
      </div>
    </div>
  </div>

  <div class="wrap">
    <!-- SIDEBAR -->
    <div class="left">
      <div class="si-sect">
        <div class="si-label">Describe your system</div>
        <textarea id="desc" placeholder="e.g.
Client → API Gateway → Auth Service
Auth Service → User DB
API Gateway → Product Service → Redis Cache
Product Service → PostgreSQL
All services → Message Queue → Notification Service"></textarea>
        <button class="btn btn-acc" style="width:100%;margin-top:10px;justify-content:center"
          onclick="generateFromText()">⚡ Generate Diagram</button>
      </div>
      <div class="si-divider"></div>

      <div class="si-sect" style="padding-bottom:8px">
        <div class="si-label">Presets</div>
      </div>
      <div class="preset-grid">
        <button class="preset-btn" onclick="loadPreset('web')">🌐 Web App</button>
        <button class="preset-btn" onclick="loadPreset('micro')">⚙️ Microservices</button>
        <button class="preset-btn" onclick="loadPreset('mobile')">📱 Mobile Backend</button>
        <button class="preset-btn" onclick="loadPreset('data')">📊 Data Pipeline</button>
      </div>
      <div class="si-divider"></div>

      <div class="si-sect" style="padding-bottom:4px">
        <div class="si-label">Add Nodes (drag to canvas)</div>
      </div>
      <div class="palette" id="palette"></div>
      <div class="si-divider"></div>
      <div class="si-sect" style="font-size:11px;color:var(--txt3);line-height:1.7;padding-bottom:16px">
        💡 <strong style="color:var(--txt2)">Tips:</strong><br>
        • Drag nodes to reposition<br>
        • Click node to select, then click another to connect<br>
        • Delete: select node + press <kbd
          style="background:var(--surf3);border:1px solid var(--bdr2);border-radius:3px;padding:1px 4px;font-size:10px">Del</kbd><br>
        • Double-click node to rename
      </div>
    </div>

    <!-- CANVAS -->
    <div class="right">
      <div class="toolbar">
        <button class="btn" onclick="zoomIn()">＋ Zoom</button>
        <button class="btn" onclick="zoomOut()">－ Zoom</button>
        <button class="btn" onclick="fitAll()">⊡ Fit</button>
        <div class="tool-sep"></div>
        <select id="layout-sel" onchange="applyLayout()">
          <option value="flow">↓ Top-Down</option>
          <option value="lr">→ Left-Right</option>
          <option value="radial">◎ Radial</option>
        </select>
        <div class="tool-sep"></div>
        <span style="font-size:11px;color:var(--txt3)">Nodes: <strong id="node-count"
            style="color:var(--txt2)">0</strong> · Edges: <strong id="edge-count"
            style="color:var(--txt2)">0</strong></span>
      </div>
      <div class="canvas-wrap">
        <canvas id="cv"></canvas>
      </div>
    </div>
  </div>

  <script>
    // ── Theme ────────────────────────────────────────────────
    function toggleTheme() { const h = document.documentElement; h.dataset.theme = h.dataset.theme === 'dark' ? 'light' : 'dark'; document.getElementById('tok').textContent = h.dataset.theme === 'dark' ? '☀️' : '🌙'; draw() }
    document.getElementById('tok').textContent = '☀️';
    function isDark() { return document.documentElement.dataset.theme === 'dark' }

    // ── Canvas setup ─────────────────────────────────────────
    const cvEl = document.getElementById('cv');
    const ctx = cvEl.getContext('2d');
    let W, H;
    function resize() { const wr = cvEl.parentElement; W = cvEl.width = wr.clientWidth * devicePixelRatio; H = cvEl.height = wr.clientHeight * devicePixelRatio; cvEl.style.width = wr.clientWidth + 'px'; cvEl.style.height = wr.clientHeight + 'px'; draw() }
    window.addEventListener('resize', resize);

    // ── State ────────────────────────────────────────────────
    let nodes = [], edges = [], selected = null, connecting = null;
    let drag = null, dragOffX = 0, dragOffY = 0;
    let panX = 0, panY = 0, scale = 1;
    let panDrag = false, panStartX = 0, panStartY = 0;

    // Node types with colors
    const NODE_TYPES = {
      client: { icon: '👤', label: 'Client', fill: '#6366f1', dark: '#4f46e5' },
      browser: { icon: '🌐', label: 'Browser', fill: '#0ea5e9', dark: '#0284c7' },
      gateway: { icon: '🔀', label: 'API Gateway', fill: '#8b5cf6', dark: '#7c3aed' },
      service: { icon: '⚙️', label: 'Service', fill: '#10b981', dark: '#059669' },
      database: { icon: '🗄️', label: 'Database', fill: '#f59e0b', dark: '#d97706' },
      cache: { icon: '⚡', label: 'Cache', fill: '#ef4444', dark: '#dc2626' },
      queue: { icon: '📨', label: 'Queue', fill: '#f97316', dark: '#ea580c' },
      cdn: { icon: '🌍', label: 'CDN', fill: '#06b6d4', dark: '#0891b2' },
      lb: { icon: '⚖️', label: 'Load Balancer', fill: '#6366f1', dark: '#4f46e5' },
      storage: { icon: '💾', label: 'Storage', fill: '#84cc16', dark: '#65a30d' },
      auth: { icon: '🔐', label: 'Auth', fill: '#ec4899', dark: '#db2777' },
      mobile: { icon: '📱', label: 'Mobile', fill: '#14b8a6', dark: '#0d9488' },
    };

    // Build palette
    const pal = document.getElementById('palette');
    Object.entries(NODE_TYPES).forEach(([k, t]) => {
      const d = document.createElement('div');
      d.className = 'pal-node';
      d.textContent = `${t.icon} ${t.label}`;
      d.style.cssText = `background:${t.fill}22;color:${t.fill};border-color:${t.fill}55`;
      d.draggable = true;
      d.addEventListener('dragstart', e => e.dataTransfer.setData('nodeType', k));
      pal.appendChild(d);
    });

    cvEl.addEventListener('dragover', e => { e.preventDefault() });
    cvEl.addEventListener('drop', e => {
      e.preventDefault();
      const type = e.dataTransfer.getData('nodeType'); if (!type) return;
      const rect = cvEl.getBoundingClientRect();
      const wx = (e.clientX - rect.left) / scale - panX;
      const wy = (e.clientY - rect.top) / scale - panY;
      addNode(type, wx, wy);
    });

    // ── Node helpers ─────────────────────────────────────────
    let nid = 0;
    function addNode(type, x, y, label) {
      const t = NODE_TYPES[type] || NODE_TYPES.service;
      nodes.push({ id: nid++, type, x, y, w: 140, h: 48, label: label || t.label, icon: t.icon, fill: t.fill, dark: t.dark });
      updateCounts(); draw();
    }
    function addEdge(a, b, label) {
      if (a === b) return;
      if (edges.find(e => (e.a === a && e.b === b) || (e.a === b && e.b === a))) return;
      edges.push({ a, b, label: label || '' });
      updateCounts(); draw();
    }
    function updateCounts() { document.getElementById('node-count').textContent = nodes.length; document.getElementById('edge-count').textContent = edges.length }
    function clearCanvas() { nodes = []; edges = []; selected = null; connecting = null; nid = 0; panX = 0; panY = 0; scale = 1; updateCounts(); draw() }

    // ── Draw ─────────────────────────────────────────────────
    function draw() {
      ctx.save();
      ctx.clearRect(0, 0, W, H);
      const bg = isDark() ? '#090b14' : '#f3f5ff';
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

      // grid
      ctx.save();
      ctx.strokeStyle = isDark() ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.04)';
      ctx.lineWidth = 1;
      const gs = 40 * scale * devicePixelRatio;
      const ox = (panX * scale * devicePixelRatio) % gs;
      const oy = (panY * scale * devicePixelRatio) % gs;
      for (let x = ox; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke() }
      for (let y = oy; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke() }
      ctx.restore();

      ctx.scale(devicePixelRatio, devicePixelRatio);
      ctx.translate(panX + W / devicePixelRatio / 2, panY + H / devicePixelRatio / 2);
      ctx.scale(scale, scale);
      ctx.translate(-W / devicePixelRatio / 2, -H / devicePixelRatio / 2);

      // edges
      edges.forEach(e => {
        const a = nodes.find(n => n.id === e.a), b = nodes.find(n => n.id === e.b); if (!a || !b) return;
        const ax = a.x + a.w / 2, ay = a.y + a.h / 2, bx = b.x + b.w / 2, by = b.y + b.h / 2;
        const cp1x = (ax + bx) / 2, cp1y = ay; const cp2x = (ax + bx) / 2, cp2y = by;
        ctx.save();
        ctx.strokeStyle = isDark() ? 'rgba(129,140,248,0.5)' : 'rgba(99,102,241,0.4)';
        ctx.lineWidth = 2; ctx.setLineDash([]);
        ctx.beginPath(); ctx.moveTo(ax, ay); ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, bx, by); ctx.stroke();
        // arrowhead
        const angle = Math.atan2(by - cp2y, bx - cp2x);
        ctx.fillStyle = isDark() ? 'rgba(129,140,248,0.7)' : 'rgba(99,102,241,0.6)';
        ctx.beginPath(); ctx.translate(bx, by); ctx.rotate(angle); ctx.moveTo(-12, -5); ctx.lineTo(0, 0); ctx.lineTo(-12, 5); ctx.closePath(); ctx.fill();
        ctx.restore();
        if (e.label) {
          ctx.font = '11px Sora'; ctx.fillStyle = isDark() ? '#818cf8' : '#6366f1'; ctx.textAlign = 'center';
          ctx.fillText(e.label, (ax + bx) / 2, (ay + by) / 2 - 8);
        }
      });

      // connecting preview
      if (connecting !== null) {
        const a = nodes.find(n => n.id === connecting);
        if (a && mouseW !== null) {
          ctx.save(); ctx.strokeStyle = isDark() ? 'rgba(129,140,248,.6)' : 'rgba(99,102,241,.5)'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
          ctx.beginPath(); ctx.moveTo(a.x + a.w / 2, a.y + a.h / 2); ctx.lineTo(mouseW.x, mouseW.y); ctx.stroke();
          ctx.restore();
        }
      }

      // nodes
      nodes.forEach(n => {
        const isSel = selected === n.id;
        const isConn = connecting === n.id;
        ctx.save();
        // shadow
        ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = isSel ? 16 : 8; ctx.shadowOffsetY = isSel ? 4 : 2;
        // bg
        const fillAlpha = isDark() ? '33' : '22';
        ctx.fillStyle = n.fill + fillAlpha;
        roundRect(ctx, n.x, n.y, n.w, n.h, 10); ctx.fill();
        ctx.shadowColor = 'transparent';
        // border
        ctx.strokeStyle = isSel ? n.fill : (isConn ? '#f59e0b' : (isDark() ? n.fill + '88' : n.fill + '66'));
        ctx.lineWidth = isSel ? 2.5 : 1.5;
        roundRect(ctx, n.x, n.y, n.w, n.h, 10); ctx.stroke();
        // icon
        ctx.font = '18px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(n.icon, n.x + 22, n.y + n.h / 2);
        // label
        ctx.font = `600 12px Sora`; ctx.fillStyle = isDark() ? '#dde0f5' : '#141628'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        const maxW = n.w - 38;
        let lbl = n.label;
        if (ctx.measureText(lbl).width > maxW) while (ctx.measureText(lbl + '…').width > maxW && lbl.length > 0) lbl = lbl.slice(0, -1);
        if (lbl !== n.label) lbl += '…';
        ctx.fillText(lbl, n.x + 36, n.y + n.h / 2);
        ctx.restore();
      });

      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r); ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r); ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r); ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r); ctx.closePath() }

    // ── Mouse ─────────────────────────────────────────────────
    let mouseW = null;
    function toWorld(cx, cy) { const r = cvEl.getBoundingClientRect(); const sx = cx - r.left, sy = cy - r.top; return { x: (sx - W / devicePixelRatio / 2) / scale + W / devicePixelRatio / 2 - panX, y: (sy - H / devicePixelRatio / 2) / scale + H / devicePixelRatio / 2 - panY } }
    function hitNode(wx, wy) { return nodes.slice().reverse().find(n => wx >= n.x && wx <= n.x + n.w && wy >= n.y && wy <= n.y + n.h) || null }

    cvEl.addEventListener('mousemove', e => {
      const w = toWorld(e.clientX, e.clientY); mouseW = w;
      if (drag) { drag.x = w.x - dragOffX; drag.y = w.y - dragOffY; draw(); return }
      if (panDrag) { panX = w.x - panStartX + (W / devicePixelRatio / 2) / scale - W / devicePixelRatio / 2 / scale; panY = w.y - panStartY + (H / devicePixelRatio / 2) / scale - H / devicePixelRatio / 2 / scale; draw(); return }
      if (connecting !== null) { draw(); return }
      const hit = hitNode(w.x, w.y); cvEl.style.cursor = hit ? 'grab' : 'default';
    });

    cvEl.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      const w = toWorld(e.clientX, e.clientY);
      const hit = hitNode(w.x, w.y);
      if (hit) {
        if (connecting !== null && connecting !== hit.id) { addEdge(connecting, hit.id); connecting = null; selected = null; draw(); return }
        if (e.shiftKey) { connecting = hit.id; selected = hit.id; draw(); return }
        drag = hit; dragOffX = w.x - hit.x; dragOffY = w.y - hit.y; selected = hit.id; connecting = null; draw();
      } else {
        if (connecting !== null) { connecting = null; draw(); return }
        selected = null; panDrag = true; panStartX = w.x + (W / devicePixelRatio / 2) / scale - W / devicePixelRatio / 2 / scale - panX; panStartY = w.y + (H / devicePixelRatio / 2) / scale - H / devicePixelRatio / 2 / scale - panY;
      }
    });

    cvEl.addEventListener('mouseup', () => { drag = null; panDrag = false });
    cvEl.addEventListener('wheel', e => { e.preventDefault(); const f = e.deltaY < 0 ? 1.1 : .91; scale = Math.min(4, Math.max(.2, scale * f)); draw() }, { passive: false });

    cvEl.addEventListener('dblclick', e => {
      const w = toWorld(e.clientX, e.clientY); const hit = hitNode(w.x, w.y);
      if (hit) { const n = prompt('Rename node:', hit.label); if (n !== null) { hit.label = n; draw() } }
    });

    // Delete on key
    window.addEventListener('keydown', e => {
      if ((e.key === 'Delete' || e.key === 'Backspace') && selected !== null && document.activeElement === document.body) {
        nodes = nodes.filter(n => n.id !== selected);
        edges = edges.filter(e => e.a !== selected && e.b !== selected);
        selected = null; updateCounts(); draw();
      }
    });

    // ── Zoom / Pan ───────────────────────────────────────────
    function zoomIn() { scale = Math.min(4, scale * 1.2); draw() }
    function zoomOut() { scale = Math.max(.2, scale * .83); draw() }
    function fitAll() {
      if (!nodes.length) { scale = 1; panX = 0; panY = 0; draw(); return }
      const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y), xe = nodes.map(n => n.x + n.w), ye = nodes.map(n => n.y + n.h);
      const minX = Math.min(...xs) - 30, minY = Math.min(...ys) - 30, maxX = Math.max(...xe) + 30, maxY = Math.max(...ye) + 30;
      const cw = W / devicePixelRatio, ch = H / devicePixelRatio;
      scale = Math.min(4, Math.min(cw / (maxX - minX), ch / (maxY - minY)) * .9);
      panX = cw / 2 / scale - (minX + maxX) / 2; panY = ch / 2 / scale - (minY + maxY) / 2; draw();
    }

    // ── Layout ───────────────────────────────────────────────
    function applyLayout() {
      const l = document.getElementById('layout-sel').value;
      if (!nodes.length) return;
      const cw = W / devicePixelRatio, ch = H / devicePixelRatio;
      const pad = 60, nw = 140, nh = 48;
      if (l === 'flow') {
        // simple topological sort attempt
        const cols = Math.ceil(Math.sqrt(nodes.length));
        nodes.forEach((n, i) => { n.x = pad + (i % cols) * (nw + 60); n.y = pad + Math.floor(i / cols) * (nh + 60) });
      } else if (l === 'lr') {
        const rows = Math.ceil(Math.sqrt(nodes.length));
        nodes.forEach((n, i) => { n.y = pad + (i % rows) * (nh + 60); n.x = pad + Math.floor(i / rows) * (nw + 80) });
      } else if (l === 'radial') {
        const cx = cw / 2 - 70, cy = ch / 2 - 24;
        const r = Math.min(cx, cy) * .7;
        nodes.forEach((n, i) => { const a = 2 * Math.PI * i / nodes.length - Math.PI / 2; n.x = cx + r * Math.cos(a) - nw / 2; n.y = cy + r * Math.sin(a) - nh / 2 });
      }
      fitAll();
    }

    // ── Text parser ──────────────────────────────────────────
    function guessType(label) {
      const l = label.toLowerCase();
      if (/client|user|browser|web app/.test(l)) return l.includes('mobile') ? 'mobile' : 'client';
      if (/gateway|proxy/.test(l)) return 'gateway';
      if (/load bal|lb/.test(l)) return 'lb';
      if (/auth|oauth|sso/.test(l)) return 'auth';
      if (/redis|cache|memcache/.test(l)) return 'cache';
      if (/db|database|postgres|mysql|mongo|dynamo/.test(l)) return 'database';
      if (/queue|kafka|rabbit|sqs|pubsub/.test(l)) return 'queue';
      if (/cdn|cloudfront/.test(l)) return 'cdn';
      if (/storage|s3|blob/.test(l)) return 'storage';
      if (/mobile|ios|android/.test(l)) return 'mobile';
      return 'service';
    }

    function generateFromText() {
      const txt = document.getElementById('desc').value.trim(); if (!txt) return;
      clearCanvas();
      const lines = txt.split('\n').filter(l => l.trim());
      const nodeMap = {};
      lines.forEach(line => {
        const parts = line.split(/→|->|--> /).map(s => s.trim()).filter(Boolean);
        parts.forEach(label => {
          if (!nodeMap[label]) {
            nodeMap[label] = { type: guessType(label), label };
          }
        });
      });
      // layout
      const labels = Object.keys(nodeMap);
      const cols = Math.max(1, Math.ceil(Math.sqrt(labels.length)));
      const cw = W / devicePixelRatio, ch = H / devicePixelRatio;
      const startX = cw * .1, startY = ch * .1, gapX = 180, gapY = 90;
      labels.forEach((lbl, i) => {
        const x = startX + (i % cols) * gapX; const y = startY + Math.floor(i / cols) * gapY;
        addNode(nodeMap[lbl].type, x, y, lbl);
        nodeMap[lbl].id = nodes[nodes.length - 1].id;
      });
      // edges
      lines.forEach(line => {
        const parts = line.split(/→|->|-->/).map(s => s.trim()).filter(Boolean);
        for (let i = 0; i < parts.length - 1; i++) {
          const a = nodeMap[parts[i]], b = nodeMap[parts[i + 1]];
          if (a && b) addEdge(a.id, b.id);
        }
      });
      fitAll();
    }

    // ── Presets ──────────────────────────────────────────────
    const PRESETS = {
      web: `Browser → Load Balancer → Web Server
Web Server → Auth Service → User DB
Web Server → Product Service → PostgreSQL
Web Server → Cache Redis
Product Service → Cache Redis
Web Server → CDN`,
      micro: `Mobile App → API Gateway
Browser → API Gateway
API Gateway → Auth Service → User DB
API Gateway → Order Service → Order DB
API Gateway → Notification Service → Message Queue
Order Service → Payment Service → Payment DB
Message Queue → Email Service`,
      mobile: `iOS App → API Gateway
Android App → API Gateway
API Gateway → Load Balancer → App Service
App Service → Redis Cache
App Service → PostgreSQL
App Service → S3 Storage
App Service → Message Queue → Push Notification`,
      data: `Data Sources → Kafka Queue
Kafka Queue → Stream Processor
Stream Processor → Data Warehouse
Stream Processor → Real-time Dashboard
Data Warehouse → Analytics Service → Dashboard
Kafka Queue → Raw Storage S3`,
    };
    function loadPreset(k) { document.getElementById('desc').value = PRESETS[k] || ''; generateFromText() }

    function downloadDiagram() {
      const a = document.createElement('a'); a.download = 'system-design.png'; a.href = cvEl.toDataURL('image/png'); a.click(); toast('Exported PNG!');
    }

    function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2600) }

    resize();
    // Load default preset
    loadPreset('web');
  </script>
</body>

</html>
